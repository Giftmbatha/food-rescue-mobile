# Spring Boot configuration for Food Rescue backend
spring:
  application:
    name: food-rescue-backend

  # Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/foodrescue
    username: dev
    password: dev
    driver-class-name: org.postgresql.Driver

  # JPA / Hibernate configuration
  jpa:
    hibernate:
      ddl-auto: update # validation checks schema matches entities, does not modify DB
    show-sql: true # logs SQL queries during development

  # JWT Configuration
  jwt:
    secret: ${JWT_SECRET:my-very-long-secret-key-that-needs-to-be-at-least-256-bits-for-hs256-algorithm-to-work-properly}
    access-token-expiration-ms: 900000        # 15 minutes
    refresh-token-expiration-ms: 604800000    # 7 days

  # Redis configuration
  data:
    redis:
      host: localhost
      port: 6379
      # No password for local dev (Redis configured without AUTH)

  # RabbitMQ configuration
  rabbitmq:
    host: localhost
    port: 5672
    username: dev
    password: dev

  # Server configuration
server:
  port: 8080

  # Logging
logging:
  level:
    com.foodrescue.backend: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  # Actuator endpoints for health checks
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always